<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1a3a5c">
  <title>Piano Alimentare</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --hdr:    #1a3a5c;
      --hdr2:   #1e4570;
      --bg:     #f0f4f8;
      --card:   #ffffff;
      --accent: #2196F3;
      --acl:    #e3f2fd;
      --text:   #1a2332;
      --muted:  #718096;
      --border: #e2e8f0;
      --r:      12px;
      --sh:     0 2px 10px rgba(26,58,92,.10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEADER ── */
    header {
      background: var(--hdr);
      color: #fff;
      padding: 14px 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,.20);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 12px;
    }

    .app-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -.2px;
    }
    .app-title span { opacity: .7; font-weight: 400; font-size: 13px; margin-left: 4px; }

    .btn-reset-all {
      background: rgba(255,255,255,.12);
      border: 1.5px solid rgba(255,255,255,.25);
      color: rgba(255,255,255,.9);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .3px;
      transition: background .15s;
    }
    .btn-reset-all:active { background: rgba(255,255,255,.22); }

    /* ── TABS ── */
    .tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: 1;
      min-width: 72px;
      padding: 10px 6px 12px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,.5);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      user-select: none;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .tab.active {
      color: #fff;
      border-bottom-color: #64B5F6;
      font-weight: 700;
    }

    /* ── MAIN ── */
    main {
      padding: 14px 14px 40px;
      max-width: 560px;
      margin: 0 auto;
    }

    .meal-panel { display: none; }
    .meal-panel.active { display: block; }

    /* ── GROUP CARD ── */
    .group-card {
      background: var(--card);
      border-radius: var(--r);
      box-shadow: var(--sh);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--hdr2);
      color: #fff;
    }

    .group-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      opacity: .88;
    }

    .btn-reset {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
      color: rgba(255,255,255,.85);
      padding: 3px 11px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-reset:active { background: rgba(255,255,255,.22); }

    /* ── ITEM ROW ── */
    .item-row {
      display: flex;
      align-items: center;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      background: #fff;
      min-height: 46px;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row.is-main   { background: #f5f9ff; }

    .item-sep {
      height: 0;
      border-bottom: 1.5px dashed var(--border);
      margin: 0 14px;
    }

    .name-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .item-name {
      font-size: 14px;
      color: var(--text);
      line-height: 1.35;
    }

    .badge-main {
      background: var(--accent);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: .4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .qty-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .qty-input {
      width: 60px;
      text-align: right;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 7px 8px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      background: #fff;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color .15s, background .15s;
    }
    .qty-input::-webkit-inner-spin-button,
    .qty-input::-webkit-outer-spin-button { display: none; }
    .qty-input:focus {
      border-color: var(--accent);
      background: var(--acl);
    }

    .qty-unit {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      width: 18px;
    }

    /* ── HIGHLIGHT ANIMATION ── */
    @keyframes flash {
      0%   { background: #fff59d; }
      100% { background: #fff; }
    }
    @keyframes flash-main {
      0%   { background: #fff59d; }
      100% { background: #f5f9ff; }
    }

    .item-row.updated         { animation: flash      .75s ease-out forwards; }
    .item-row.is-main.updated { animation: flash-main .75s ease-out forwards; }

    /* ── FOOTER NOTE ── */
    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 8px 0 0;
      opacity: .7;
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">

    <button class="btn-reset-all" onclick="resetMeal()">↺ Reset pasto</button>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

/* ═══════════════════════════════════════════════
   STATE
   state[groupId] = [ currentQty, ... ] (one per item)
═══════════════════════════════════════════════ */
const state = {};

function initState() {
  MEALS.forEach(meal =>
    meal.groups.forEach(group => {
      state[group.id] = group.items.map(item => item.qty);
    })
  );
}

/* ═══════════════════════════════════════════════
   RENDER (one-time build)
═══════════════════════════════════════════════ */
let activeMealIdx = 0;

function buildUI() {
  const tabsEl = document.getElementById('tabs');
  const mainEl = document.getElementById('main');

  // Tabs
  tabsEl.innerHTML = MEALS.map((m, i) =>
    `<div class="tab${i === 0 ? ' active' : ''}" data-meal="${i}">${m.label}</div>`
  ).join('');

  // Panels
  mainEl.innerHTML = MEALS.map((meal, mi) =>
    `<div class="meal-panel${mi === 0 ? ' active' : ''}" id="mp-${mi}">` +
    meal.groups.map(g => buildGroup(g)).join('') +
    `<p class="footer-note">Modifica qualsiasi valore — tutto il gruppo scala proporzionalmente</p>` +
    `</div>`
  ).join('');

  // Tab events
  tabsEl.querySelectorAll('.tab').forEach(tab =>
    tab.addEventListener('click', () => switchMeal(+tab.dataset.meal))
  );

  // Input events
  mainEl.querySelectorAll('.qty-input').forEach(input => {
    input.addEventListener('focus',   () => input.select());
    input.addEventListener('blur',    () => onInput(input));
    input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
  });
}

function buildGroup(group) {
  const mIdx = group.items.findIndex(i => i.main);
  const mainIdx = mIdx >= 0 ? mIdx : 0;

  // Build row strings
  const rows = group.items.map((item, idx) => {
    const isMain = idx === mainIdx;
    const qty = state[group.id][idx];
    return `<div class="item-row${isMain ? ' is-main' : ''}" id="row-${group.id}-${idx}">` +
      `<div class="name-wrap">` +
        `<span class="item-name">${escHtml(item.name)}</span>` +
        (isMain ? `<span class="badge-main">principale</span>` : '') +
      `</div>` +
      `<div class="qty-wrap">` +
        `<input type="number" class="qty-input" inputmode="decimal"` +
          ` value="${qty}"` +
          ` aria-label="${escHtml(item.name)} quantità in grammi"` +
          ` data-group="${group.id}"` +
          ` data-idx="${idx}">` +
        `<span class="qty-unit">gr</span>` +
      `</div>` +
    `</div>`;
  });

  // Insert visual separator after main item (only if not last)
  if (group.items.length > 1 && mainIdx < group.items.length - 1) {
    rows.splice(mainIdx + 1, 0, `<div class="item-sep"></div>`);
  }

  return `<div class="group-card">` +
    `<div class="group-header">` +
      `<span class="group-title">${escHtml(group.label)}</span>` +
      `<button class="btn-reset" onclick="resetGroup('${group.id}')">↺ Reset</button>` +
    `</div>` +
    rows.join('') +
  `</div>`;
}

/* ═══════════════════════════════════════════════
   CORE LOGIC
═══════════════════════════════════════════════ */

/**
 * Called on blur (or Enter) of a qty input.
 * Scales all items in the same group proportionally.
 * Formula:  newQty_i = originalQty_i * (newValue / originalQty_changed)
 */
function onInput(input) {
  const groupId    = input.dataset.group;
  const changedIdx = +input.dataset.idx;
  const newVal     = Math.round(parseFloat(input.value));

  // Validate: must be a positive integer
  if (!isFinite(newVal) || newVal <= 0) {
    input.value = state[groupId][changedIdx];
    return;
  }

  const group = findGroup(groupId);
  if (!group) return;

  // Single-item group: update only this item, no scaling
  if (group.items.length <= 1) {
    state[groupId][changedIdx] = newVal;
    input.value = newVal;
    return;
  }

  const origChanged = group.items[changedIdx].qty;
  const scaleFactor = newVal / origChanged;

  group.items.forEach((item, i) => {
    const newQty = Math.round(item.qty * scaleFactor);
    const oldQty = state[groupId][i];
    state[groupId][i] = newQty;

    const row = document.getElementById(`row-${groupId}-${i}`);
    if (!row) return;
    row.querySelector('.qty-input').value = newQty;

    // Highlight every item whose value changed
    if (newQty !== oldQty) flash(row);
  });
}

function resetGroup(groupId) {
  const group = findGroup(groupId);
  if (!group) return;

  group.items.forEach((item, i) => {
    const old = state[groupId][i];
    state[groupId][i] = item.qty;

    const row = document.getElementById(`row-${groupId}-${i}`);
    if (!row) return;
    row.querySelector('.qty-input').value = item.qty;
    if (item.qty !== old) flash(row);
  });
}

function resetMeal() {
  MEALS[activeMealIdx].groups.forEach(g => resetGroup(g.id));
}

function switchMeal(idx) {
  activeMealIdx = idx;
  document.querySelectorAll('.tab')
    .forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.meal-panel')
    .forEach((p, i) => p.classList.toggle('active', i === idx));
}

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */

function flash(row) {
  row.classList.remove('updated');
  void row.offsetWidth; // force reflow to restart animation
  row.classList.add('updated');
  row.addEventListener('animationend', () => row.classList.remove('updated'), { once: true });
}

function findGroup(id) {
  for (const meal of MEALS) {
    const g = meal.groups.find(g => g.id === id);
    if (g) return g;
  }
  return null;
}

function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ═══════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════ */
initState();
buildUI();
</script>
